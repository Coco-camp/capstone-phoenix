---
# Idempotent by design: every task uses modules/creates guards, so running
# this twice in a row makes no changes on the second run.

- name: Harden all nodes
  hosts: k3s_cluster
  become: true
  roles:
    - hardening

- name: Install k3s control-plane
  hosts: control_plane
  become: true
  roles:
    - k3s_server

- name: Join workers to the cluster
  hosts: workers
  become: true
  roles:
    - k3s_agent

- name: Verify cluster
  hosts: control_plane
  become: true
  tasks:
    - name: Get nodes
      ansible.builtin.command: k3s kubectl get nodes -o wide
      register: nodes_out
      changed_when: false

    - name: Show node status
      ansible.builtin.debug:
        msg: "{{ nodes_out.stdout_lines }}"
