# Template only. Copy to secret.yaml, fill in real values, and apply directly
# with `kubectl apply -f` — do NOT commit secret.yaml (it's gitignored) and do
# NOT add it to the kustomization.yaml resource list, since GitOps would then
# need it in git in plaintext.
#
# Stretch goal (see README §4 Stretch): swap this for Sealed Secrets or
# External Secrets so an encrypted version CAN live safely in git and be
# owned by Argo CD like everything else.
apiVersion: v1
kind: Secret
metadata:
  name: taskapp-secret
  namespace: taskapp
type: Opaque
stringData:
  POSTGRES_USER: "taskapp"
  POSTGRES_PASSWORD: "CHANGE_ME_STRONG_PASSWORD"
  SECRET_KEY: "CHANGE_ME_FLASK_SECRET_KEY"
  DATABASE_URL: "postgresql://taskapp:CHANGE_ME_STRONG_PASSWORD@postgres.taskapp.svc.cluster.local:5432/taskapp"
