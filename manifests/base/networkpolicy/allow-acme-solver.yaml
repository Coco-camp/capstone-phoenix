# cert-manager's HTTP-01 solver pods aren't labeled app=backend/app=frontend,
# so none of the existing allow-rules cover them -- default-deny-all was
# silently blocking Traefik's validation requests, causing Let's Encrypt to
# see a 502 and the Certificate to stay stuck in Pending forever. Confirmed
# as a real bug once NetworkPolicy enforcement was verified working (see
# ARCHITECTURE.md #4).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-acme-solver-from-ingress
  namespace: taskapp
spec:
  podSelector:
    matchLabels:
      acme.cert-manager.io/http01-solver: "true"
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
