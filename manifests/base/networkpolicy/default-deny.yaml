# k3s ships Flannel as its default CNI, which does NOT enforce NetworkPolicy.
# We swap it for Calico in CNI-policy mode (see docs/RUNBOOK.md for the k3s
# install flag: --flannel-backend=none, then apply Calico) specifically so
# these policies are actually enforced, not just declared.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: taskapp
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress:
    # DNS must stay open or every pod breaks
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
