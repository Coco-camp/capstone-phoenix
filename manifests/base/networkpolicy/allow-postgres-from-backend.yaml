apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-from-backend
  namespace: taskapp
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: backend
      ports:
        - protocol: TCP
          port: 5432
    # Allow the one-off migration Job too — it shares the "backend" release
    # but isn't labeled app=backend, so match it explicitly by job-name.
    - from:
        - podSelector:
            matchLabels:
              job-name: taskapp-migrate
      ports:
        - protocol: TCP
          port: 5432
