apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - configmap.yaml
  - cluster-issuer.yaml
  - ingress.yaml
  - postgres/statefulset.yaml
  - postgres/service.yaml
  - backend/migration-job.yaml
  - backend/deployment.yaml
  - backend/service.yaml
  - backend/hpa.yaml
  - backend/pdb.yaml
  - frontend/deployment.yaml
  - frontend/service.yaml
  - frontend/pdb.yaml
  - networkpolicy/default-deny.yaml
  - networkpolicy/allow-postgres-from-backend.yaml
  - networkpolicy/allow-backend-ingress.yaml
  - networkpolicy/allow-migration-egress.yaml
  - networkpolicy/allow-acme-solver.yaml

# NOTE: secret.yaml is intentionally NOT listed here — see secret.example.yaml
# for why. Apply it manually once per cluster, outside of GitOps, until the
# Sealed Secrets stretch goal is done.
